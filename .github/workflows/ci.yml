name: CI

on:
  push:
    branches: ['main']
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: |
          pnpm fetch --frozen-lockfile
          pnpm install --frozen-lockfile --offline

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm run test

      - name: Build (all apps)
        run: pnpm run build
