name: Build (Docker Hub) & Deploy (Azure Container Apps)

on:
  push:
    branches: ['main']

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - name: auth
            dockerfile: apps/auth/Dockerfile
            image: quickbite-auth
            appNameSecret: AUTH_APP_NAME
          - name: api-gateway
            dockerfile: apps/api-gateway/Dockerfile
            image: quickbite-api-gateway
            appNameSecret: GATEWAY_APP_NAME
          - name: products
            dockerfile: apps/products/Dockerfile
            image: quickbite-products
            appNameSecret: PRODUCTS_APP_NAME

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push to Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service.image }}:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service.image }}:latest

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container App (pull public Docker Hub image)
        run: |
          APP_NAME="${{ secrets[matrix.service.appNameSecret] }}"
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service.image }}:${{ github.sha }}"
          az containerapp update \
            --name "$APP_NAME" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --image "$IMAGE"
